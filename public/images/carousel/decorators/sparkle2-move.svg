<svg width="40" height="40" viewBox="10.5 17 18.5 18" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes twinkle {
      0%, 100% { 
        opacity: 0.4; 
        transform: scale(0.8); 
      }
      50% { 
        opacity: 1; 
        transform: scale(1.1); 
      }
    }
    .sparkle {
      transform-origin: center;
      transform-box: fill-box;
    }
    /* Tiempos de animación desfasados para un efecto más natural */
    .sparkle-1 { animation: twinkle 2.5s ease-in-out infinite; }
    .sparkle-2 { animation: twinkle 3s ease-in-out infinite 0.7s; }
    .sparkle-3 { animation: twinkle 2s ease-in-out infinite 1.4s; }
  </style>

